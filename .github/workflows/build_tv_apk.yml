name: Build Android TV APK

on:
  workflow_dispatch:  # 手动触发
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'
        type: string

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Get dependencies
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build APK (unsigned)
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 7

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-tv-${{ github.run_number }}
          name: Android TV Build #${{ github.run_number }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: true