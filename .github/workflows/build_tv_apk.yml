name: Build Android TV APK

on:
  workflow_dispatch:  # 手动触发
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'
        type: string

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Get dependencies
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build APK (debug signed, universal)
        run: |
          cd simple_live_tv_app
          flutter build apk --debug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-tv-apk
          path: ./apks

      - name: List downloaded files
        run: ls -la ./apks/

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: tv-latest
          name: Android TV Latest Build
          body: |
            Android TV APK（debug 签名，可直接安装）

            Build Number: ${{ github.run_number }}
            Branch: ${{ github.event.inputs.branch }}
          files: ./apks/app-debug.apk
          draft: false
          prerelease: false