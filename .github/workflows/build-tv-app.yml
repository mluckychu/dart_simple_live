name: Build Android TV APK

on:
  push:
    branches: [ master, main ]
    paths:
      - 'simple_live_tv_app/**'
      - 'simple_live_core/**'
      - '.github/workflows/build-tv-app.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'simple_live_tv_app/**'
      - 'simple_live_core/**'
      - '.github/workflows/build-tv-app.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build APK (Release)
        run: |
          cd simple_live_tv_app
          flutter build apk --release

      - name: Build App Bundle (Release)
        run: |
          cd simple_live_tv_app
          flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-tv-apk
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-tv-aab
          path: simple_live_tv_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk
            simple_live_tv_app/build/app/outputs/bundle/release/app-release.aab
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            Simple Live TV APK 自动构建
            
            **版本信息:**
            - 构建号: ${{ github.run_number }}
            - 提交: ${{ github.sha }}
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            
            **下载文件:**
            - `app-release.apk` - 安装包(直接安装)
            - `app-release.aab` - 应用商店上传包
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
